<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Table | Coffee House</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url('./assets/images/cta-bg.jpg') center/cover no-repeat fixed;
            background-color: #1a1a1a; 
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        /* ===== CONTAINER ===== */
        .booking-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ===== CARD ===== */
        .booking-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 750px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        @keyframes slideIn {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .booking-title {
            text-align: center;
            margin-bottom: 30px;
            color: #3e2723;
            font-weight: 600;
            font-size: 1.8rem;
        }

        /* ===== FORM GRID ===== */
        .booking-form {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }

        .booking-form input,
        .booking-form select,
        .booking-form textarea {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1.5px solid #eee;
            background: #f9f9f9;
            font-size: 14px;
            color: #333;
            transition: all 0.3s ease;
            outline: none;
        }

        .booking-form input:focus,
        .booking-form select:focus,
        .booking-form textarea:focus {
            border-color: #6f4e37;
            background: #fff;
            box-shadow: 0 0 8px rgba(111, 78, 55, 0.2);
            transform: translateY(-2px);
        }

        .booking-form textarea {
            grid-column: span 2;
            resize: none;
            height: 100px;
        }

        /* ===== BUTTON ===== */
        .book-btn {
            grid-column: span 2;
            padding: 16px;
            background: #6f4e37;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .book-btn:hover {
            background: #3e2723;
            box-shadow: 0 10px 20px rgba(62, 39, 35, 0.3);
            transform: scale(1.02);
        }

        .book-btn:active {
            transform: scale(0.98);
        }

        /* BACK HOME LINK */
        .back-home {
            text-align: center;
            margin-top: 25px;
        }

        .back-home a {
            text-decoration: none;
            color: #8d6e63;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-home a:hover {
            color: #6f4e37;
            text-decoration: underline;
        }

        /* ===== RESPONSIVE FIX (Stacking on Mobile) ===== */
        @media (max-width: 600px) {
            .booking-form {
                grid-template-columns: 1fr;
            }
            .booking-form textarea, .book-btn {
                grid-column: span 1;
            }
            .booking-card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

<div class="booking-container">
    <div class="booking-card">
        <h2 class="booking-title">Reserve Your Coffee Table ☕</h2>

        <form class="booking-form">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="tel" placeholder="Phone Number" required>

            <select required>
                <option value="" disabled selected>Number of Guests</option>
                <option>1 Person</option>
                <option>2 Persons</option>
                <option>3 Persons</option>
                <option>4 Persons</option>
                <option>5+ Persons</option>
            </select>

            <input type="date" required>
            <input type="time" required>

            <select required>
                <option value="" disabled selected>Seating Preference</option>
                <option>Indoor</option>
                <option>Outdoor</option>
                <option>Window Side</option>
                <option>Family Area</option>
            </select>

            <select required>
                <option value="" disabled selected>Occasion</option>
                <option>Casual Visit</option>
                <option>Birthday</option>
                <option>Meeting</option>
                <option>Family Dinner</option>
            </select>

            <textarea placeholder="Special Requests (Optional)"></textarea>

            <button type="submit" class="book-btn">Confirm Reservation</button>
        </form>

        <div class="back-home">
            <a href="index.html">← Back to Keofi Home</a>
        </div>
    </div>
</div>

</body>
</html>
